<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <title>My wife</title>

  <style>
    body {
      overflow: hidden;
    }

    .drop {
      position: absolute;
      top: -10px;
      color: #ff4d6d;
      animation: fall linear infinite;
      opacity: .75;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(110vh);
      }
    }
  </style>
</head>

<body class="bg-[#E6E6FA] flex items-center justify-center min-h-screen px-4 relative">

<!-- Rain -->
<div id="rain"></div>

<!-- Content -->
<div class="text-center z-10">

    <!-- Main Text -->
    <h1 class="text-[#FF4D6D] text-5xl sm:text-6xl md:text-7xl font-bold"
        style="font-family:'Great Vibes', cursive;">
      Seni sevaman xayotim
      <i class="fa-solid fa-heart text-red-500"></i>
    </h1>

    <!-- Sub Text -->
    <p class="mt-6 text-gray-700 text-lg sm:text-xl">
      Bu yurak faqat seniki
      <i class="fa-solid fa-heart text-pink-500"></i>
    </p>

    <!-- Heart Animation -->
    <div class="mt-8 text-4xl text-pink-500 animate-pulse">
      <i class="fa-solid fa-heart"></i>
      <i class="fa-solid fa-heart mx-2"></i>
      <i class="fa-solid fa-heart"></i>
      <i class="fa-solid fa-heart mx-2"></i>
      <i class="fa-solid fa-heart"></i>
    </div>

    <!-- Buttons -->
    <div class="flex flex-col gap-4 mt-10 items-center">

      <a href="page5.html"
         class="px-6 py-3 bg-white rounded-full shadow-md hover:scale-105 transition text-pink-500 font-semibold">

      <a href="main.html"

        <i class="fa-solid fa-rotate-left mr-2"></i>
        Qaytadan boshlash
      </a>

    </div>

</div>

<!-- Rain Script -->
<script>
function createDrop() {
  const drop = document.createElement("div");
  drop.classList.add("drop");

  drop.innerHTML = '<i class="fa-solid fa-heart"></i>';

  drop.style.left = Math.random() * 100 + "vw";
  drop.style.fontSize = (Math.random() * 15 + 10) + "px";
  drop.style.animationDuration = (Math.random() * 3 + 2) + "s";

  document.body.appendChild(drop);

  setTimeout(() => {
    drop.remove();
  }, 6000);
}

setInterval(createDrop, 150);
</script>

</body>
