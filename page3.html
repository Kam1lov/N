<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <title>My wife</title>

  <style>
    body {
      overflow: hidden;
    }

    .drop {
      position: absolute;
      top: -10px;
      color: #ff4d6d;
      animation: fall linear infinite;
      opacity: 0.7;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(110vh);
      }
    }
  </style>
</head>

<body class="bg-[#E6E6FA] flex items-center justify-center h-screen relative">

<!-- Rain -->
<div id="rain"></div>

<!-- Content -->
<div class="text-center px-6 z-10">

    <!-- Main Message -->
    <h1 class="text-[#FF4D6D] text-4xl sm:text-5xl md:text-6xl mb-6"
        style="font-family:'Great Vibes', cursive;">
      Bu yurak faqat san uchun uradi
      <i class="fa-solid fa-heart text-pink-500"></i>
    </h1>

    <!-- Subtitle -->
    <p class="text-gray-700 text-lg sm:text-xl max-w-xl mx-auto">
      Har bir sahifa sani ko‘proq sevishimni ko‘rsatadi...
      <br><br>
      Endi san mening eng chiroyli hikoyamsan
      <i class="fa-solid fa-heart text-pink-400"></i>
    </p>

    <!-- Heart Effect -->
    <div class="mt-6 text-3xl animate-pulse text-pink-500">
      <i class="fa-solid fa-heart"></i>
      <i class="fa-solid fa-heart mx-2"></i>
      <i class="fa-solid fa-heart"></i>
      <i class="fa-solid fa-heart mx-2"></i>
      <i class="fa-solid fa-heart"></i>
    </div>

    <!-- Buttons -->
    <div class="flex flex-col gap-4 mt-10 items-center">

      <a href="page5.html"
        class="w-full sm:w-auto text-center px-4 py-2 sm:px-6 sm:py-3 bg-white rounded-full shadow-md hover:scale-105 transition text-pink-500 font-semibold">
        Keyingi
        <i class="fa-solid fa-arrow-right ml-2"></i>
      </a>

      <a href="main.html"
        class="w-full sm:w-auto text-center px-4 py-2 sm:px-6 sm:py-3 bg-white text-pink-500 rounded-full shadow-md hover:scale-105 transition font-semibold">
        <i class="fa-solid fa-rotate-left mr-2"></i>
        Orqaga
      </a>

    </div>

</div>

<!-- Rain Script -->
<script>
  function createDrop() {
    const drop = document.createElement("div");
    drop.classList.add("drop");

    drop.innerHTML = '<i class="fa-solid fa-heart"></i>';

    drop.style.left = Math.random() * 100 + "vw";
    drop.style.fontSize = (Math.random() * 15 + 10) + "px";
    drop.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(drop);

    setTimeout(() => {
      drop.remove();
    }, 6000);
  }

  setInterval(createDrop, 150);
</script>

</body>
</html>
